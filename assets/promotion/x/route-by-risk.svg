<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="900" viewBox="0 0 1600 900" role="img" aria-labelledby="title description">
  <title id="title">Route by risk</title>
  <desc id="description">Simple, standard, mechanical, and high-risk coding work follow different workflow depths.</desc>
  <rect width="1600" height="900" fill="#141719"/>
  <g font-family="Arial, Helvetica, sans-serif">
    <text x="84" y="90" fill="#34C6A4" font-size="20" font-weight="700" letter-spacing="4">MODEL ECONOMY / WORKING IDEA</text>
    <text x="84" y="205" fill="#F5F7F7" font-size="70" font-weight="700">Route by risk.</text>
    <text x="88" y="258" fill="#C8D0D2" font-size="27">Workflow depth should follow the task, not habit.</text>
    <path d="M84 308H1516" fill="none" stroke="#647077" stroke-width="2"/>
    <g fill="#1D2326" stroke="#7B878C" stroke-width="2">
      <rect x="84" y="374" width="338" height="250" rx="3"/>
      <rect x="448" y="374" width="338" height="250" rx="3"/>
      <rect x="812" y="374" width="338" height="250" rx="3"/>
      <rect x="1176" y="374" width="340" height="250" rx="3"/>
    </g>
    <text x="116" y="422" fill="#AEB8BC" font-size="17" font-weight="700" letter-spacing="3">SIMPLE</text>
    <text x="116" y="492" fill="#F5F7F7" font-size="31" font-weight="700">Main agent</text>
    <text x="116" y="535" fill="#C8D0D2" font-size="21">Implement + verify</text>
    <text x="480" y="422" fill="#AEB8BC" font-size="17" font-weight="700" letter-spacing="3">STANDARD</text>
    <text x="480" y="492" fill="#F5F7F7" font-size="31" font-weight="700">Balanced</text>
    <text x="480" y="535" fill="#C8D0D2" font-size="21">Bounded execution</text>
    <text x="844" y="422" fill="#AEB8BC" font-size="17" font-weight="700" letter-spacing="3">MECHANICAL</text>
    <text x="844" y="492" fill="#F5F7F7" font-size="31" font-weight="700">Economy batch</text>
    <text x="844" y="535" fill="#C8D0D2" font-size="21">Repeatable work</text>
    <text x="1208" y="422" fill="#F6B74D" font-size="17" font-weight="700" letter-spacing="3">HIGH-RISK</text>
    <text x="1208" y="492" fill="#F5F7F7" font-size="31" font-weight="700">Decide + review</text>
    <text x="1208" y="535" fill="#C8D0D2" font-size="21">Explicit quality gates</text>
    <path d="M84 690H1516" fill="none" stroke="#647077" stroke-width="2"/>
    <text x="84" y="758" fill="#F5F7F7" font-size="25">The classification is a policy decision. Verification still needs evidence.</text>
    <text x="84" y="838" fill="#AEB8BC" font-size="18">Community project · actual model and role identity remain unverified</text>
  </g>
  <path d="M107 588H399M471 588H763M835 588H1127" stroke="#34C6A4" stroke-width="7"/>
  <path d="M1199 588H1493" stroke="#F6B74D" stroke-width="7"/>
</svg>
