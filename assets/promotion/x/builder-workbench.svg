<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="900" viewBox="0 0 1600 900" role="img" aria-labelledby="title description">
  <title id="title">Project 01 release note</title>
  <desc id="description">A developer-style release card with the Model Economy version, local status output, test count, and supported CI platforms.</desc>
  <rect width="1600" height="900" fill="#141719"/>
  <g font-family="Arial, Helvetica, sans-serif">
    <text x="82" y="82" fill="#AEB8BC" font-size="19" font-weight="700" letter-spacing="4">BUILDING SMALL TOOLS IN PUBLIC · PROJECT 01</text>
    <path d="M82 112H1518" fill="none" stroke="#647077" stroke-width="2"/>

    <text x="82" y="282" fill="#34C6A4" font-size="22" font-weight="700" letter-spacing="4">COMMUNITY CODEX PLUGIN</text>
    <text x="82" y="390" fill="#F5F7F7" font-size="86" font-weight="700">MODEL ECONOMY</text>
    <text x="86" y="450" fill="#C8D0D2" font-size="29">Route development work by risk before choosing workflow depth.</text>
    <rect x="82" y="525" width="318" height="58" rx="2" fill="#F6B74D"/>
    <text x="108" y="563" fill="#141719" font-size="21" font-weight="700" letter-spacing="2">VERSION 0.6.0</text>
    <text x="82" y="646" fill="#AEB8BC" font-size="20">Open source · no fixed savings claim</text>

    <rect x="930" y="182" width="588" height="464" rx="6" fill="#0D1012" stroke="#647077" stroke-width="2"/>
    <rect x="930" y="182" width="588" height="54" rx="6" fill="#1D2326"/>
    <circle cx="964" cy="209" r="7" fill="#F6B74D"/>
    <circle cx="990" cy="209" r="7" fill="#647077"/>
    <circle cx="1016" cy="209" r="7" fill="#34C6A4"/>
    <text x="1050" y="216" fill="#AEB8BC" font-size="15" font-weight="700" letter-spacing="2">LOCAL RELEASE CHECK</text>
    <g font-family="SFMono-Regular, Menlo, Consolas, monospace" font-size="21">
      <text x="970" y="292" fill="#34C6A4">$ model-economy status</text>
      <text x="970" y="348" fill="#C8D0D2">version</text>
      <text x="1180" y="348" fill="#F5F7F7">0.6.0</text>
      <text x="970" y="400" fill="#C8D0D2">mode</text>
      <text x="1180" y="400" fill="#F5F7F7">enhanced</text>
      <text x="970" y="452" fill="#C8D0D2">roles</text>
      <text x="1180" y="452" fill="#F5F7F7">6 / 6</text>
      <text x="970" y="504" fill="#C8D0D2">mapping</text>
      <text x="1180" y="504" fill="#F5F7F7">explicit</text>
      <text x="970" y="556" fill="#C8D0D2">identity</text>
      <text x="1180" y="556" fill="#F6B74D">unverified</text>
      <text x="970" y="608" fill="#34C6A4">healthy</text>
    </g>

    <path d="M82 728H1518" fill="none" stroke="#647077" stroke-width="2"/>
    <text x="82" y="790" fill="#F5F7F7" font-size="20" font-weight="700" letter-spacing="2">RELEASE CI GREEN</text>
    <text x="570" y="790" fill="#F5F7F7" font-size="20" font-weight="700" letter-spacing="2">MACOS · LINUX · WINDOWS</text>
    <text x="1262" y="790" fill="#F5F7F7" font-size="20" font-weight="700" letter-spacing="2">OPEN SOURCE</text>
    <text x="82" y="850" fill="#AEB8BC" font-size="17">Local role and model identity remain unverified.</text>
  </g>
</svg>
