<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="900" viewBox="0 0 1600 900" role="img" aria-labelledby="title description">
  <title id="title">Claims and boundaries</title>
  <desc id="description">Model Economy does not claim fixed token savings or verified model identities.</desc>
  <rect width="1600" height="900" fill="#141719"/>
  <g font-family="Arial, Helvetica, sans-serif">
    <text x="84" y="88" fill="#F6B74D" font-size="20" font-weight="700" letter-spacing="4">BEFORE THE NUMBERS</text>
    <text x="84" y="207" fill="#F5F7F7" font-size="67" font-weight="700">What this project does not claim.</text>
    <path d="M84 264H1516" fill="none" stroke="#647077" stroke-width="2"/>
    <g fill="#1D2326" stroke="#7B878C" stroke-width="2">
      <rect x="84" y="340" width="1432" height="112" rx="3"/>
      <rect x="84" y="480" width="1432" height="112" rx="3"/>
      <rect x="84" y="620" width="1432" height="112" rx="3"/>
    </g>
    <text x="124" y="410" fill="#F5F7F7" font-size="32" font-weight="700">No fixed token-savings percentage.</text>
    <text x="124" y="550" fill="#F5F7F7" font-size="32" font-weight="700">No verified model or role identity.</text>
    <text x="124" y="690" fill="#F5F7F7" font-size="32" font-weight="700">Policy-level caps, not runtime billing guarantees.</text>
    <text x="84" y="830" fill="#34C6A4" font-size="22" font-weight="700" letter-spacing="2">MEASURE FIRST. REPORT WHAT THE DATA CAN SUPPORT.</text>
  </g>
  <g fill="none" stroke="#F6B74D" stroke-width="6">
    <circle cx="1460" cy="396" r="24"/><path d="M1444 380L1476 412M1476 380L1444 412"/>
    <circle cx="1460" cy="536" r="24"/><path d="M1444 520L1476 552M1476 520L1444 552"/>
    <circle cx="1460" cy="676" r="24"/><path d="M1444 660L1476 692M1476 660L1444 692"/>
  </g>
</svg>
