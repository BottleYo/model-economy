name: 缺陷报告
description: 报告可复现的错误或行为回归
title: "[Bug] "
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: 请先移除凭据、认证缓存、原始 session、私人路径和项目数据。
  - type: input
    id: version
    attributes:
      label: Model Economy 版本
    validations:
      required: true
  - type: textarea
    id: environment
    attributes:
      label: 环境
      description: 操作系统、Python 与 Codex 版本。
    validations:
      required: true
  - type: textarea
    id: reproduce
    attributes:
      label: 复现步骤
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: 预期与实际行为
    validations:
      required: true
  - type: checkboxes
    id: sanitized
    attributes:
      label: 隐私确认
      options:
        - label: 我已移除敏感信息和私人项目内容。
          required: true
